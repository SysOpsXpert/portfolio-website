apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-website
  namespace: portfolio-project # You can change this to your preferred OpenShift project name
  labels:
    app: portfolio-website
spec:
  replicas: 2
  selector:
    matchLabels:
      app: portfolio-website
  template:
    metadata:
      labels:
        app: portfolio-website
    spec:
      containers:
      - name: web
        # Replace 'YOUR_GITHUB_USERNAME' with your actual lowercase GitHub username
        image: ghcr.io/sysopsxpert/portfolio-website:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: portfolio-service
  namespace: portfolio-project
spec:
  selector:
    app: portfolio-website
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
